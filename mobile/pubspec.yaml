name: taskforge_mobile
description: TaskForge - Project Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # HTTP
  dio: ^5.4.0
  # Navigation
  go_router: ^13.1.0
  # Real-time
  signalr_netcore: ^1.3.6
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  # Utils
  intl: ^0.19.0
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
